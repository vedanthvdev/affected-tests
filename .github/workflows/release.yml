name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write

    env:
      # Route github.* context values through env vars rather than inlining
      # them into shell scripts. This prevents expression injection when those
      # values contain shell metacharacters (e.g. a branch ref with `;`, `$`
      # or backticks).
      GH_ACTOR: ${{ github.actor }}
      GH_TOKEN: ${{ github.token }}
      GH_REF_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Check if HEAD is already tagged
        id: tag_check
        run: |
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      # Only create a new tag if HEAD is not already tagged. If a previous run
      # tagged successfully but failed during publish, re-running this workflow
      # will skip tagging and proceed straight to the "publish if missing" step
      # below — that's what makes the pipeline idempotent.
      - name: Release (auto-increment patch, tag, push)
        if: steps.tag_check.outputs.already_tagged == 'false'
        run: ./gradlew release -Prelease.pushTagsOnly "-Prelease.customUsername=$GH_ACTOR" "-Prelease.customPassword=$GH_TOKEN"

      - name: Resolve released version
        id: released
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version is release-quality
        env:
          VERSION: ${{ steps.released.outputs.version }}
        run: |
          if [[ "$VERSION" == *"-alpha"* || "$VERSION" == *"-SNAPSHOT"* ]]; then
            echo "::error::Unexpected version '$VERSION' — aborting publish"
            exit 1
          fi

      - name: Build
        run: ./gradlew clean build

      # Ask the Plugin Portal whether this exact version already exists. If a
      # previous run tagged + built + published successfully but failed after
      # (e.g. when creating the GitHub Release), re-running the workflow must
      # not attempt to publish the same artifact twice — the portal rejects
      # re-publishing and the whole job would fail.
      - name: Check if plugin version already published
        id: portal_check
        env:
          VERSION: ${{ steps.released.outputs.version }}
        run: |
          URL="https://plugins.gradle.org/plugin/io.affectedtests/$VERSION"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL")
          if [[ "$STATUS" == "200" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Plugin version $VERSION is already on the Gradle Plugin Portal — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Gradle Plugin Portal
        if: steps.portal_check.outputs.already_published == 'false'
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.released.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --target "$GH_REF_NAME"
          else
            echo "GitHub Release $TAG already exists — skipping"
          fi
