name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Check if already tagged
        id: tag_check
        run: |
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release (auto-increment patch, tag, push)
        if: steps.tag_check.outputs.already_tagged == 'false'
        run: ./gradlew release -Prelease.pushTagsOnly -Prelease.customUsername=${{ github.actor }} -Prelease.customPassword=${{ github.token }}

      - name: Get released version
        id: released
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version is release-quality
        run: |
          VERSION="${{ steps.released.outputs.version }}"
          if [[ "$VERSION" == *"-alpha"* || "$VERSION" == *"-SNAPSHOT"* ]]; then
            echo "::error::Unexpected version '$VERSION' — aborting publish"
            exit 1
          fi

      - name: Build
        run: ./gradlew clean build

      - name: Publish to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.released.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --target ${{ github.ref_name }}
          else
            echo "GitHub Release $TAG already exists — skipping"
          fi
